<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tectónica Editorial | Lanzamiento 01: Therians</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        :root {
            --azul-tectonico: #1a3a6c;
            --papel: #f4f1ea;
            --mesa: #121212;
            --rojo-lacre: #a31d1d;
        }

        body {
            background-color: var(--mesa);
            background-image: radial-gradient(#222 1px, transparent 1px);
            background-size: 20px 20px;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Cormorant Garamond', serif;
        }

        .book {
            width: 90%;
            max-width: 1100px;
            background: var(--papel);
            box-shadow: 0 0 100px rgba(0,0,0,0.5), 20px 20px 60px rgba(0,0,0,0.8);
            display: flex;
            position: relative;
            padding: 40px 0;
            border-radius: 5px;
            margin: 20px;
        }

        .book::before {
            content: '';
            position: absolute;
            left: 50%; top: 0; bottom: 0;
            width: 2px;
            background: rgba(0,0,0,0.1);
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            z-index: 10;
        }

        .page {
            flex: 1;
            padding: 40px 60px;
            position: relative;
            z-index: 5;
        }

        /* Página Izquierda (Editorial) */
        .left-page {
            border-right: 1px solid rgba(0,0,0,0.05);
            text-align: center;
        }

        .logo {
            max-width: 160px;
            filter: contrast(1.1);
            margin-bottom: 20px;
        }

        .editorial-title {
            font-size: 2.5rem;
            color: var(--azul-tectonico);
            margin: 0;
            line-height: 1;
        }

        .meta-info {
            font-family: 'Special Elite', cursive;
            font-size: 0.75rem;
            color: #777;
            text-align: left;
            margin-top: 80px;
            border-left: 2px solid var(--azul-tectonico);
            padding-left: 15px;
        }

        /* Página Derecha (El Libro) */
        .right-page {
            display: flex;
            flex-direction: column;
        }

        .book-cover {
            max-width: 280px;
            align-self: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border-radius: 2px;
            margin-bottom: 25px;
            transition: transform 0.3s ease;
        }

        .book-cover:hover {
            transform: scale(1.02);
        }

        .book-title {
            font-size: 2.2rem;
            line-height: 1.1;
            color: #111;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .book-subtitle {
            font-size: 1.1rem;
            color: #666;
            font-style: italic;
            margin-bottom: 20px;
        }

        .description {
            font-size: 1.15rem;
            line-height: 1.5;
            text-align: justify;
            color: #333;
        }
