<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tectónica Editorial</title>
    <style>
        body {
            font-family: 'Georgia', serif;
            background-color: #fdfdfd;
            color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            border-top: 2px solid #1a1a1a;
            border-bottom: 2px solid #1a1a1a;
            padding: 40px 20px;
            max-width: 600px;
        }
        h1 {
            font-weight: normal;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin: 0 0 10px 0;
        }
        p {
            font-style: italic;
            font-size: 1.2rem;
            color: #555;
        }
        .footer {
            margin-top: 20px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tectónica Editorial</h1>
        <p>Movimientos en la estructura del pensamiento.</p>
        <div class="footer">Próximamente | Filosofía y Fenómenos Sociales</div>
    </div>
</body>
</html>
