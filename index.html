<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tectónica Editorial | Gabriel Alcántara Tovar</title>
    
    <meta name="description" content="Editorial académica de Gabriel Alcántara Tovar. Investigaciones sobre el fenómeno Therian y análisis histórico de Alejandro Magno bajo la perspectiva humanista biosférica.">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Special+Elite&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --azul: #1a3a6c;
            --papel: #f4f1ea;
            --mesa: #121212;
            --dorado: #b8860b;
            --texto: #1a1a1a;
        }

        body {
            background-color: var(--mesa);
            margin: 0;
            padding: 0;
            font-family: 'Cormorant Garamond', serif;
            color: var(--papel);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* --- VISTA 1: BIBLIOTECA / ESCRITORIO --- */
        #vista-biblioteca {
            width: 95%;
            max-width: 1000px;
            padding: 40px 10px;
            display: block;
        }

        header.mision-vision {
            background: var(--papel);
            color: var(--texto);
            padding: 50px 30px;
            border-radius: 4px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.8);
            margin-bottom: 50px;
            text-align: center;
            border-bottom: 12px solid var(--dorado);
        }

        .mision-vision h1 { font-size: clamp(2.5rem, 10vw, 4.5rem); color: var(--azul); margin: 0; font-weight: 600; }
        .mision-vision p { font-size: clamp(1.5rem, 6vw, 2rem); line-height: 1.4; font-style: italic; margin-top: 30px; color: #333; }

        .titulo-seccion { font-family: 'Special Elite'; color: var(--dorado); text-align: center; font-size: 2rem; margin-bottom: 40px; text-transform: uppercase; }

        .estante {
            display: flex;
            gap: 50px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 60px;
        }

        .libro-objeto {
            width: 100%;
            max-width: 300px;
            cursor: pointer;
            text-align: center;
            transition: transform 0.3s;
            background: none;
            border: none;
            padding: 0;
            color: inherit;
        }
        .libro-objeto:hover { transform: translateY(-15px); }

        .libro-objeto img {
            width: 100%;
            height: auto; 
            background: #222;
            border-radius: 2px 8px 8px 2px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
            border-left: 10px solid rgba(0,0,0,0.3);
            display: block;
            margin: 0 auto;
        }
        
        .libro-objeto h3 { margin-top: 20px; font-family: 'Special Elite'; font-size: 1.4rem; color: var(--dorado); }

        /* SEO Indexable oculto visualmente */
        .seo-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }

        /* --- SECCIÓN CONTACTO (TAMAÑO NORMALIZADO PARA EL PÚBLICO) --- */
        .seccion-contacto {
            margin-top: 40px;
            padding: 30px;
            background: #1a1a1a;
            border: 1px solid var(--dorado);
            border-radius: 4px;
            width: 100%;
            max-width: 600px; /* Ancho estándar de formulario */
            box-sizing: border-box;
            margin-left: auto;
            margin-right: auto;
        }

        .seccion-contacto h2 {
            font-size: 1.6rem;
            margin-bottom: 20px;
            font-family: 'Special Elite';
            color: var(--dorado);
            text-align: center;
        }

        .form-control {
            width: 100%;
            padding: 10px 15px;
            font-size: 1rem; /* Tamaño de texto de formulario estándar */
            font-family: 'Cormorant Garamond', serif;
            background: var(--papel);
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-bottom: 15px;
            box-sizing: border-box;
            color: var(--texto);
        }

        textarea.form-control {
            height: 100px;
            resize: vertical;
        }

        .btn-enviar {
            background: var(--dorado);
            color: white;
            border: none;
            padding: 12px 20px;
            font-family: 'Special Elite';
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            border-radius: 4px;
            transition: background 0.3s;
        }
        .btn-enviar:hover { background: #966d09; }

        /* --- VISTA 2: LECTOR --- */
        #vista-lector {
            display: none;
            width: 100%;
            max-width: 1300px;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .barra-navegacion { display: flex; gap: 15px; margin-bottom: 25px; width: 100%; flex-wrap: wrap; }
        
        .btn-nav {
            background: var(--azul);
            color: white;
            border: 3px solid var(--dorado);
            padding: 15px 20px;
            font-family: 'Special Elite';
            font-size: 1.1rem;
            cursor: pointer;
            flex: 1;
            min-width: 150px;
            transition: background 0.3s;
        }
        .btn-nav:hover { background: #254d8c; }

        .contenedor-dual {
            display: flex;
            flex-direction: column;
            background: var(--papel);
            border-radius: 8px;
            color: var(--texto);
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(0,0,0,0.6);
        }

        .ficha-tecnica { padding: 40px; background: #eeebe3; text-align: center; border-bottom: 3px solid #ddd; }
        
        .meta-box {
            text-align: left;
            font-family: 'Special Elite';
            border-left: 6px solid var(--azul);
            padding-left: 25px;
            margin-top: 25px;
            font-size: 1.2rem;
            color: #444;
            line-height: 1.6;
        }

        .contenido-libro { padding: 50px 40px; position: relative; }
        
        .portada-lector { 
            max-height: 400px; 
            width: auto;
            display: block; 
            margin: 0 auto 40px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            border-radius: 2px 8px 8px 2px;
        }

        .texto-academico { font-size: 1.4rem; line-height: 1.6; text-align: justify; margin-bottom: 40px; }
        .capitular::first-letter {
            float: left; font-size: 5rem; line-height: 0.8; padding-top: 5px; padding-right: 15px; color: var(--azul); font-weight: bold;
        }

        .separador {
            height: 2px;
            background: linear-gradient(to right, transparent, var(--dorado), transparent);
            margin: 50px 0;
        }

        .contenedor-botones { display: flex; flex-direction: column; gap: 15px; margin-top: 50px; }
        
        .btn-accion { 
            padding: 20px; 
            text-decoration: none; 
            font-family: 'Special Elite'; 
            text-align: center; 
            font-size: 1.2rem; 
            font-weight: bold;
            border-radius: 4px;
            transition: background 0.3s, color 0.3s;
        }
        .btn-pdf { border: 3px solid var(--azul); color: var(--azul); }
        .btn-pdf:hover { background: var(--azul); color: white; }
        .btn-mail { background: var(--azul); color: white; }
        .btn-mail:hover { background: #15305b; }

        @media (min-width: 1000px) {
            .contenedor-dual { flex-direction: row; min-height: auto; }
            .ficha-tecnica { width: 35%; border-bottom: 0; border-right: 3px solid #ddd; }
            .contenido-libro { width: 65%; padding: 60px 80px; }
            .barra-navegacion { flex-wrap: nowrap; }
            .btn-nav { flex: none; width: 200px; }
        }
    </style>
</head>

                    <input type="text" id="nombre" name="nombre" class="form-control" required placeholder="Nombre completo" aria-required="true">
                    
                    <label for="email" class="seo-hidden">Correo electrónico</label>
                    <input type="email" id="email" name="_replyto" class="form-control" required placeholder="Correo electrónico de contacto" aria-required="true">
                    
                    <label for="mensaje" class="seo-hidden">Mensaje o consulta</label>
                    <textarea id="mensaje" name="mensaje" class="form-control" required placeholder="Mensaje o consulta académica" aria-required="true"></textarea>
                </div>
                <button type="submit" class="btn-enviar" aria-label="Enviar formulario de contacto">Enviar Mensaje</button>
            </form>
        </section>
    </main>

    <div id="vista-lector" aria-hidden="true">
        <nav class="barra-navegacion">
            <button class="btn-nav" onclick="irABiblioteca()" aria-label="Regresar al escritorio de la biblioteca">⬅ ESCRITORIO</button>
            <button class="btn-nav" onclick="cambiarLibro(-1)" aria-label="Ver volumen anterior">ANTERIOR</button>

        <article class="contenedor-dual">

                <h2 id="meta-vol" style="margin: 30px 0; color: var(--azul); font-size: 2rem; font-family:'Special Elite'; display:none;"></h2> <div id="meta-datos" class="meta-box"></div>
            </aside>

            <section class="contenido-libro">
                <img id="libro-img" src="" class="portada-lector" alt="Portada del libro en lectura">
                
                <h2 id="libro-titulo" style="margin:0; font-size: 3rem; color: var(--azul); line-height: 1.1;"></h2>
                <p id="libro-sub" style="font-style:italic; color:#666; font-size: 1.5rem; margin-bottom: 40px;"></p>
                
                <div id="libro-intro" class="texto-academico capitular"></div>
                
                <div class="separador"></div>
                
                <h3 style="font-family:'Special Elite'; color:var(--azul); font-size: 1.8rem; margin-bottom:30px;">ANÁLISIS DE LA OBRA</h3>
                <div id="libro-cuerpo" class="texto-academico"></div>
                
                <div class="contenedor-botones">
                    <a id="btn-pdf" href="#" download class="btn-accion btn-pdf" aria-label="Descargar fragmento en PDF">📥 DESCARGAR FRAGMENTO (PDF)</a>
                    <a href="mailto:contacto@tectonicaeditorial.com" class="btn-accion btn-mail" aria-label="Contactar al autor">✉️ CONTACTAR AL AUTOR</a>
                </div>
            </section>
        </article>
    </div>
