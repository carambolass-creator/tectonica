<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tectónica Editorial | Gabriel Alcántara Tovar</title>
    
    <meta name="description" content="Tectónica Editorial - Investigación con rigor académico bajo la perspectiva humanista biosférica por Gabriel Alcántara Tovar.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Special+Elite&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --azul: #1a3a6c;
            --papel: #f4f1ea;
            --mesa: #121212;
            --dorado: #b8860b;
            --texto: #1a1a1a;
        }

        body {
            background-color: var(--mesa);
            margin: 0;
            padding: 0;
            font-family: 'Cormorant Garamond', serif;
            color: var(--papel);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* --- VISTA 1: BIBLIOTECA --- */
        #vista-biblioteca {
            width: 95%;
            max-width: 1000px;
            padding: 40px 10px;
            display: block; /* Asegura visibilidad inicial */
        }

        .mision-vision {
            background: var(--papel);
            color: var(--texto);
            padding: 50px 30px;
            border-radius: 4px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.8);
            margin-bottom: 50px;
            text-align: center;
            border-bottom: 12px solid var(--dorado);
        }

        .mision-vision h1 { font-size: clamp(2.5rem, 10vw, 4rem); color: var(--azul); margin: 0; font-weight: 600; }
        .mision-vision p { font-size: clamp(1.4rem, 5vw, 1.8rem); line-height: 1.5; font-style: italic; margin-top: 25px; color: #333; }

        .titulo-seccion { font-family: 'Special Elite'; color: var(--dorado); text-align: center; font-size: 2.2rem; margin-bottom: 40px; text-transform: uppercase; }

        .estante {
            display: flex;
            gap: 50px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 60px;
        }

        .libro-objeto {
            width: 100%;
            max-width: 300px;
            cursor: pointer;
            text-align: center;
            transition: transform 0.3s;
            background: none;
            border: none;
            padding: 0;
            color: inherit;
        }
        .libro-objeto:hover { transform: translateY(-15px); }

        .libro-objeto img {
            width: 100%;
            aspect-ratio: 3 / 4;
            object-fit: cover;
            background: #222;
            border-radius: 2px 8px 8px 2px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
            border-left: 10px solid rgba(0,0,0,0.3);
        }
        
        .libro-objeto h3 { margin-top: 20px; font-family: 'Special Elite'; font-size: 1.5rem; color: var(--dorado); }

        .seo-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }

        /* --- SECCIÓN CONTACTO RESTAURADA --- */
        .seccion-contacto {
            margin-top: 60px;
            padding: 45px;
            background: #1a1a1a;
            border: 2px solid var(--dorado);
            border-radius: 4px;
            width: 100%;
            display: block !important; /* Fuerza la visibilidad */
            box-sizing: border-box;
        }

        .form-control {
            width: 100%;
            padding: 18px;
            font-size: 1.8rem;
            font-family: 'Cormorant Garamond', serif;
            background: var(--papel);
            border: none;
            border-radius: 4px;
            margin-bottom: 20px;
            box-sizing: border-box;
            color: var(--texto);
        }

        .btn-enviar {
            background: var(--dorado);
            color: white;
            border: none;
            padding: 22px;
            font-family: 'Special Elite';
            font-size: 1.8rem;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn-enviar:hover { background: #966d09; }

        /* --- VISTA 2: LECTOR --- */
        #vista-lector {
            display: none;
            width: 100%;
            max-width: 1300px;
            padding: 20px;
            box-sizing: border-box;
        }

        .barra-navegacion { display: flex; gap: 15px; margin-bottom: 25px; }
        
        .btn-nav {
            background: var(--azul);
            color: white;
            border: 3px solid var(--dorado);
            padding: 15px;
            font-family: 'Special Elite';
            font-size: 1.2rem;
            cursor: pointer;
            flex: 1;
        }

        .contenedor-dual {
            display: flex;
            flex-direction: column;
            background: var(--papel);
            border-radius: 8px;
            color: var(--texto);
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .ficha-tecnica { padding: 40px; background: #eeebe3; text-align: center; border-bottom: 3px solid #ddd; }
        .contenido-libro { padding: 40px; }
        
        .texto-academico { font-size: 1.8rem; line-height: 1.6; text-align: justify; }
        .capitular::first-letter {
            float: left; font-size: 6rem; line-height: 0.7; padding-top: 10px; padding-right: 20px; color: var(--azul); font-weight: bold;
        }

        @media (min-width: 1000px) {
            .contenedor-dual { flex-direction: row; }
            .ficha-tecnica { width: 35%; border-bottom: 0; border-right: 3px solid #ddd; }
            .contenido-libro { width: 65%; padding: 60px 80px; }
        }
    </style>
</head>
<body>

    <main id="vista-biblioteca">
        <header class="mision-vision">
            <img src="logo.webp" alt="Logotipo oficial de Tectónica Editorial" width="180" height="180" loading="lazy">
            <h1>TECTÓNICA EDITORIAL</h1>
            <p>"Tender puentes allí donde el desconocimiento ha levantado muros. Investigar con rigor académico bajo la perspectiva humanista biosférica."</p>
        </header>

        <h2 class="titulo-seccion">Catálogo Bibliográfico</h2>

        <section class="estante">
            <button class="libro-objeto" onclick="abrirLibro('therians')" aria-label="Abrir estudio sobre Therians e identidad animal">
                <img src="portaga_therians.webp" alt="Portada del libro Therians: Identidad animal en la era digital" width="300" height="400" loading="lazy">
                <h3>VOL. 001: THERIANS</h3>
                <div class="seo-hidden">
                    <p>Resumen: Análisis académico sobre el fenómeno therian y la autopercepción de la identidad animal.</p>
                </div>
            </button>

            <button class="libro-objeto" onclick="abrirLibro('alejandro')" aria-label="Abrir análisis académico sobre Alejandro III de Macedonia">
                <img src="portada-alejandro.webp" alt="Portada del libro Alejandro III de Macedonia" width="300" height="400" loading="lazy">
                <h3>VOL. 002: ALEJANDRO III</h3>
                <div class="seo-hidden">
                    <p>Resumen: Estudio integral de la figura de Alejandro Magno desde una ética biosférica.</p>
                </div>
            </button>
        </section>

        <section class="seccion-contacto">
            <h2 class="titulo-seccion">Correspondencia Editorial</h2>
            <form action="https://formspree.io/f/xqegzzqg" method="POST">
                <div class="form-grupo">
                    <label for="nombre" class="seo-hidden">Nombre completo</label>
                    <input type="text" id="nombre" name="nombre" class="form-control" required placeholder="NOMBRE COMPLETO" aria-required="true">
                    
                    <label for="email" class="seo-hidden">Correo electrónico</label>
                    <input type="email" id="email" name="_replyto" class="form-control" required placeholder="CORREO ELECTRÓNICO" aria-required="true">
                    
                    <label for="mensaje" class="seo-hidden">Mensaje o consulta</label>
                    <textarea id="mensaje" name="mensaje" class="form-control" required placeholder="MENSAJE O CONSULTA ACADÉMICA" aria-required="true" style="height:150px;"></textarea>
                </div>
                <button type="submit" class="btn-enviar" aria-label="Enviar correspondencia a la editorial">ENVIAR CORRESPONDENCIA</button>
            </form>
        </section>
    </main>

    <div id="vista-lector" aria-hidden="true">
        <nav class="barra-navegacion">
            <button class="btn-nav" onclick="irABiblioteca()" aria-label="Regresar al escritorio de la biblioteca">⬅ ESCRITORIO</button>
            <button class="btn-nav" onclick="cambiarLibro(-1)" aria-label="Ver volumen anterior">ANTERIOR</button>
            <button class="btn-nav" onclick="cambiarLibro(1)" aria-label="Ver volumen siguiente">SIGUIENTE</button>
        </nav>

        <article class="contenedor-dual">
            <aside class="ficha-tecnica">
                <h2 id="meta-vol" style="color: var(--azul); font-size: 2.2rem; font-family:'Special Elite';"></h2>
                <div id="meta-datos" style="text-align: left; font-family: 'Special Elite'; font-size: 1.3rem; border-left: 5px solid var(--azul); padding-left: 15px;"></div>
            </aside>
            <section class="contenido-libro">
                <h2 id="libro-titulo" style="font-size: 3rem; color: var(--azul); margin: 0;"></h2>
                <p id="libro-sub" style="font-style: italic; font-size: 1.5rem; color: #555; margin-bottom: 30px;"></p>
                <div id="libro-intro" class="texto-academico capitular"></div>
                <hr style="margin: 40px 0; border: 1px solid var(--dorado);">
                <div id="libro-cuerpo" class="texto-academico"></div>
            </section>
        </article>
    </div>

    <script>
        const catalogo = [
            {
                id: 'therians', vol: '001', autor: 'GABRIEL ALCÁNTARA TOVAR',
                titulo: 'THERIANS', sub: 'Identidad animal en la era digital',
                intro: 'La identidad es el territorio más complejo que un ser humano debe cartografiar. El fenómeno therian es una manifestación profunda de la búsqueda de sentido en una era de hiperconectividad.',
                cuerpo: 'Este estudio analiza cómo las nuevas generaciones replantean lo humano bajo una perspectiva de integración biosférica y rigor filosófico.'
            },
            {
                id: 'alejandro', vol: '002', autor: 'GABRIEL ALCÁNTARA TOVAR',
                titulo: 'ALEJANDRO III', sub: 'Análisis Académico Integral',
                intro: '¿Qué podemos conocer realmente sobre Alejandro Magno? Abordamos su figura desde un enfoque dialéctico-cartesiano multidimensional.',
                cuerpo: 'El análisis triangula fuentes greco-latinas con evidencia arqueológica, distinguiendo lo verificable de lo mítico bajo una ética humanista.'
            }
        ];

        let indiceActual = 0;

        function abrirLibro(id) {
            indiceActual = catalogo.findIndex(l => l.id === id);
            renderizar();
            document.getElementById('vista-biblioteca').style.display = 'none';
            document.getElementById('vista-lector').style.display = 'block';
            document.getElementById('vista-lector').setAttribute('aria-hidden', 'false');
            window.scrollTo(0,0);
        }

        function irABiblioteca() {
            document.getElementById('vista-biblioteca').style.display = 'block';
            document.getElementById('vista-lector').style.display = 'none';
            document.getElementById('vista-lector').setAttribute('aria-hidden', 'true');
        }

        function renderizar() {
            const l = catalogo[indiceActual];
            document.getElementById('meta-vol').innerText = 'VOL: ' + l.vol;
            document.getElementById('meta-datos').innerHTML = `<p>AUTOR: ${l.autor}</p><p>AÑO: 2026</p><p>ESTADO: EN PRENSA</p>`;
            document.getElementById('libro-titulo').innerText = l.titulo;
            document.getElementById('libro-sub').innerText = l.sub;
            document.getElementById('libro-intro').innerText = l.intro;
            document.getElementById('libro-cuerpo').innerText = l.cuerpo;
        }

        function cambiarLibro(delta) {
            indiceActual = (indiceActual + delta + catalogo.length) % catalogo.length;
            renderizar();
            window.scrollTo(0,0);
        }
    </script>
</body>
</html>
