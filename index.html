    <style>
        :root {
            --azul: #1a3a6c;
            --papel: #f4f1ea;
            --mesa: #121212;
            --dorado: #b8860b;
            --texto: #1a1a1a;
        }

        body {
            background-color: var(--mesa);
            margin: 0;
            padding: 0;
            font-family: 'Cormorant Garamond', serif;
            color: var(--papel);
            display: flex;
            flex-direction: column;

        }

        /* --- VISTA 1: BIBLIOTECA / ESCRITORIO --- */
        #vista-biblioteca {
            width: 95%;
            max-width: 1000px;
            padding: 40px 10px;
            display: block;
        }

        .mision-vision {
            background: var(--papel);
            color: var(--texto);
            padding: 50px 30px;
            border-radius: 4px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.8);
            margin-bottom: 50px;
            text-align: center;
            border-bottom: 12px solid var(--dorado);
        }

        .mision-vision h1 { font-size: clamp(2.5rem, 10vw, 4.5rem); color: var(--azul); margin: 0; font-weight: 600; }
        .mision-vision p { font-size: clamp(1.5rem, 6vw, 2rem); line-height: 1.4; font-style: italic; margin-top: 30px; color: #333; }

        .estante {
            display: flex;
            gap: 50px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .libro-objeto {
            width: 100%;
            max-width: 300px;
            cursor: pointer;
            text-align: center;
            transition: transform 0.3s;
            box-sizing: border-box;
        }
        .libro-objeto:hover { transform: translateY(-15px); }

        .libro-objeto img {
            width: 100%;
            aspect-ratio: 3 / 4;
            object-fit: contain;
            object-position: center;
            border-radius: 2px 8px 8px 2px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
            border-left: 10px solid rgba(0,0,0,0.2);
            box-sizing: border-box;
        }
        .libro-objeto p { margin-top: 20px; font-family: 'Special Elite'; font-size: 1.4rem; color: var(--dorado); }

        /* --- VISTA 2: LECTOR (Mesa de Trabajo) --- */
        #vista-lector {
            display: none;
            width: 100%;
            max-width: 1300px;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .barra-navegacion {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            width: 100%;
            flex-wrap: wrap;
        }

        .btn-nav {
            background: var(--azul);
            color: white;
            border: 3px solid var(--dorado);
            padding: 20px;
            font-family: 'Special Elite';
            font-size: 1.3rem;
            cursor: pointer;
            flex: 1;
            min-width: 150px;
            transition: background 0.3s;
        }
        .btn-nav:hover { background: #254d8c; }

        .contenedor-dual {
            display: flex;
            flex-direction: column;
            background: var(--papel);
            border-radius: 8px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.6);
            color: var(--texto);
        }

        .ficha-tecnica {
            padding: 40px;
            background: #eeebe3;
            border-bottom: 3px solid #ddd;
            text-align: center;
        }

        .meta-box {
            text-align: left;
            font-family: 'Special Elite';
            border-left: 6px solid var(--azul);
            padding-left: 25px;
            margin-top: 25px;
            font-size: 1.4rem;
            color: #444;
            line-height: 1.6;
        }

        .contenido-libro {
            padding: 50px 40px;
            position: relative;
        }

        .texto-academico {
            font-size: 1.7rem;
            line-height: 1.6;
            text-align: justify;
            margin-bottom: 40px;
        }

        /* --- FORMULARIO DISCRETO --- */
        .seccion-contacto {
            margin-top: 60px;
            padding: 40px;
            border-top: 1px solid #333;
            width: 100%;
            box-sizing: border-box;
        }
        .form-contacto {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        .form-contacto input, .form-contacto textarea {
            padding: 15px;
            font-size: 1.4rem;
            font-family: 'Cormorant Garamond', serif;
            background: var(--papel);
            border: 2px solid var(--dorado);
        }
        .btn-enviar {
            background: var(--dorado);
            color: white;
            font-family: 'Special Elite';
            padding: 15px;
            font-size: 1.5rem;
            border: none;
            cursor: pointer;
        }

        @media (min-width: 900px) {
            .contenedor-dual { flex-direction: row; }
            .ficha-tecnica { width: 400px; border-bottom: none; border-right: 3px solid #ddd; }
            .contenido-libro { flex: 1; height: 80vh; overflow-y: auto; }
        }
    </style>
</head>
