<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tectónica Editorial | Final</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        :root {
            --azul: #1a3a6c;
            --papel: #f4f1ea;
            --mesa: #121212;
        }

        body {
            background-color: var(--mesa);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Cormorant Garamond', serif;
            overflow-x: hidden;
        }

        .book {
            display: flex;
            width: 95%;
            max-width: 1100px;
            height: 820px;
            position: relative;
            perspective: 2000px;
        }

        /* Página Izquierda */
        .page-left {
            flex: 1;
            background: var(--papel);
            padding: 60px;
            border-radius: 5px 0 0 5px;
            box-shadow: inset -15px 0 30px rgba(0,0,0,0.05), -20px 20px 60px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            text-align: center;
            z-index: 1;
            border-right: 1px solid rgba(0,0,0,0.1);
        }

        /* Contenedor del giro */
        .flip-container {
            flex: 1;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1s cubic-bezier(0.645, 0.045, 0.355, 1);
            transform-origin: left center;
            z-index: 10;
        }

        .flipped {
            transform: rotateY(-180deg);
        }

        /* Caras de la hoja (Con scroll oculto para evitar desbordamiento) */
        .face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            padding: 50px 60px 100px 60px; 
            box-sizing: border-box;
            background: var(--papel);
            display: flex;
            flex-direction: column;
            box-shadow: inset 15px 0 30px rgba(0,0,0,0.05), 10px 10px 40px rgba(0,0,0,0.4);
            overflow-y: auto; /* Permite scroll interno si es necesario */
            scrollbar-width: none; /* Oculta scrollbar en Firefox */
        }
        
        .face::-webkit-scrollbar {
            display: none; /* Oculta scrollbar en Chrome/Safari */
        }

        .front { border-radius: 0 5px 5px 0; }
        .back { 
            transform: rotateY(180deg); 
            border-radius: 5px 0 0 5px; 
            background: #ebe8df;
        }

        /* Elementos editoriales */
        .logo { max-width: 140px; margin-bottom: 20px; }
        .cover { max-height: 230px; align-self: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); margin-bottom: 30px; }
        
        .description { font-size: 1.25rem; line-height: 1.6; text-align: justify; color: #222; }
        .capitular::first-letter {
            float: left; font-size: 3.5rem; line-height: 0.8; padding-top: 10px; padding-right: 12px; color: var(--azul); font-weight: 600;
        }

        /* --- NUEVO INDICADOR GRÁFICO ANIMADO --- */
        .indicador-giro {
            position: absolute;
            bottom: 30px;
            right: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-family: 'Special Elite', monospace;
            font-size: 0.9rem;
            color: #666;
            transition: color 0.3s;
            z-index: 100;
        }

        .indicador-giro:hover { color: var(--azul); }

        /* Animación para la cara frontal (empuja a la derecha) */
        .dedo-frente {
            font-size: 1.8rem;
            animation: empujar-der 1.2s infinite alternate ease-in-out;
        }
        @keyframes empujar-der {
            0% { transform: translateX(0); }
            100% { transform: translateX(8px); }
        }

        /* Animación para la cara trasera (empuja a la izquierda) */
        .indicador-reverso {
            right: auto;
            left: 40px;
            flex-direction: row-reverse;
        }
        .dedo-reverso {
            font-size: 1.8rem;
            transform: scaleX(-1);
            animation: empujar-izq 1.2s infinite alternate ease-in-out;
        }
        @keyframes empujar-izq {
            0% { transform: scaleX(-1) translateX(0); }
            100% { transform: scaleX(-1) translateX(-8px); } /* Nota: el movimiento se invierte por el scaleX */
        }

        .btn-contacto {
            background: var(--azul);
            color: white;
            padding: 18px;
            text-decoration: none;
            font-family: 'Special Elite';
            text-align: center;
            border-radius: 2px;
            margin-top: 40px;
        }

        /* --- OPTIMIZACIÓN MÓVIL --- */
        @media (max-width: 850px) {
            .book { flex-direction: column; height: auto; margin-top: 20px; margin-bottom: 20px;}
            .page-left { padding: 40px 30px; border-radius: 5px 5px 0 0; border-right: none; border-bottom: 1px solid rgba(0,0,0,0.1); }
            .flip-container { height: 750px; transform-origin: top; }
            .flipped { transform: rotateX(-180deg); }
            
            /* Ajustes de espacio para que no desborde */
            .face { padding: 30px 25px 80px 25px; }
            .cover
