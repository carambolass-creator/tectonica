<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Tectónica Editorial | Gabriel Alcántara Tovar</title>
    <meta name="description" content="Tectónica Editorial: Un espacio académico dedicado al análisis integral de Alejandro III de Macedonia y la identidad Therian.">
    <meta name="keywords" content="Tectónica Editorial, Gabriel Alcántara Tovar, Alejandro Magno, Therian, Identidad No Humana, Editorial Académica">
    <meta name="author" content="Gabriel Alcántara Tovar">

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Special+Elite&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --azul: #1a3a6c;
            --papel: #f4f1ea;
            --mesa: #121212;
            --dorado: #b8860b;
            --texto: #1a1a1a;
        }

        body {
            background-color: var(--mesa);
            margin: 0;
            padding: 0;
            font-family: 'Cormorant Garamond', serif;
            color: var(--papel);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- VISTA 1: BIBLIOTECA / ESCRITORIO --- */
        #vista-biblioteca {
            width: 95%;
            max-width: 1000px;
            padding: 40px 10px;
            display: block;
        }

        .mision-vision {
            background: var(--papel);
            color: var(--texto);
            padding: 50px 30px;
            border-radius: 4px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.8);
            margin-bottom: 50px;
            text-align: center;
            border-bottom: 12px solid var(--dorado);
        }

        .mision-vision h1 { font-size: clamp(2.5rem, 10vw, 4.5rem); color: var(--azul); margin: 0; font-weight: 600; }
        .mision-vision p { font-size: clamp(1.5rem, 6vw, 2rem); line-height: 1.4; font-style: italic; margin-top: 30px; color: #333; }

        .estante {
            display: flex;
            gap: 50px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .libro-objeto {
            width: 100%;
            max-width: 300px;
            cursor: pointer;
            text-align: center;
            transition: transform 0.3s;
            box-sizing: border-box;
        }
        .libro-objeto:hover { transform: translateY(-15px); }

        .libro-objeto img {
            width: 100%;
            aspect-ratio: 3 / 4;
            object-fit: contain;
            object-position: center;
            border-radius: 2px 8px 8px 2px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
            border-left: 10px solid rgba(0,0,0,0.2);
            box-sizing: border-box;
        }
        .libro-objeto p { margin-top: 20px; font-family: 'Special Elite'; font-size: 1.4rem; color: var(--dorado); }

        /* --- VISTA 2: LECTOR (Mesa de Trabajo) --- */
        #vista-lector {
            display: none;
            width: 100%;
            max-width: 1300px;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .barra-navegacion {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            width: 100%;
            flex-wrap: wrap;
        }

        .btn-nav {
            background: var(--azul);
            color: white;
            border: 3px solid var(--dorado);
            padding: 20px;
            font-family: 'Special Elite';
            font-size: 1.3rem;
            cursor: pointer;
            flex: 1;
            min-width: 150px;
            transition: background 0.3s;
        }
        .btn-nav:hover { background: #254d8c; }

        .contenedor-dual {
            display: flex;
            flex-direction: column;
            background: var(--papel);
            border-radius: 8px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.6);
            color: var(--texto);
        }

        .ficha-tecnica {
            padding: 40px;
            background: #eeebe3;
            border-bottom: 3px solid #ddd;
            text-align: center;
        }

        .meta-box {
            text-align: left;
            font-family: 'Special Elite';
            border-left: 6px solid var(--azul);
            padding-left: 25px;
            margin-top: 25px;
            font-size: 1.4rem;
            color: #444;
            line-height: 1.6;
        }

        .contenido-libro {
            padding: 50px 40px;
            position: relative;
        }

        .texto-academico {
            font-size: 1.7rem;
            line-height: 1.6;
            text-align: justify;
            margin-bottom: 40px;
        }

        .btn-pdf {
            display: block;
            background: var(--dorado);
            color: white;
            text-align: center;
            padding: 25px;
            text-decoration: none;
            font-family: 'Special Elite';
            font-size: 1.5rem;
            border-radius: 4px;
            margin-top: 40px;
        }

        /* --- ESTILOS DEL FORMULARIO (NUEVOS, INTEGRADOS DISCRETAMENTE) --- */
        .seccion-contacto {
            margin-top: 60px;
            padding: 40px;
            border-top: 1px solid #333;
            width: 100%;
            box-sizing: border-box;
        }
        .form-contacto {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        .form-contacto input, .form-contacto textarea {
            padding: 15px;
            font-size: 1.4rem;
            font-family: 'Cormorant Garamond', serif;
            background: var(--papel);
            border: 2px solid var(--dorado);
        }
        .btn-enviar {
            background: var(--dorado);
            color: white;
            font-family: 'Special Elite';
            padding: 15px;
            font-size: 1.5rem;
            border: none;
            cursor: pointer;
        }

        /* --- RESPONSIVO --- */
        @media (min-width: 900px) {
            .contenedor-dual { flex-direction: row; }
            .ficha-tecnica { width: 400px; border-bottom: none; border-right: 3px solid #ddd; }
            .contenido-libro { flex: 1; height: 80vh; overflow-y: auto; }
        }
    </style>
</head>
<body>

    <div id="vista-biblioteca">
        <div class="mision-vision">
            <h1>TECTÓNICA EDITORIAL</h1>
            <p>"La fuerza que transforma el pensamiento en estructura perdurable."</p>
        </div>

        <div class="estante" id="estante-libros">
            </div>

        <div class="seccion-contacto">
            <h2 style="text-align: center; font-family: 'Special Elite'; color: var(--dorado);">CONTACTO EDITORIAL</h2>
            <form action="https://formspree.io/f/contacto@tectonicaeditorial.com" method="POST" class="form-contacto">
                <input type="text" name="nombre" placeholder="Nombre completo" required>
                <input type="email" name="_replyto" placeholder="Su correo electrónico" required>
                <textarea name="mensaje" placeholder="Escriba su mensaje aquí..." rows="5" required></textarea>
                <button type="submit" class="btn-enviar">ENVIAR MENSAJE</button>
            </form>
        </div>
    </div>

    <div id="vista-lector">
        <div class="barra-navegacion">
            <button class="btn-nav" onclick="irABiblioteca()">⬅ VOLVER AL ESCRITORIO</button>
            <button class="btn-nav" onclick="cambiarLibro(-1)">ANTERIOR</button>
            <button class="btn-nav" onclick="cambiarLibro(1)">SIGUIENTE</button>
        </div>

        <div class="contenedor-dual">
            <div class="ficha-tecnica">
                <img id="libro-img" src="" class="portada-lector" style="max-height: 400px; display: block; margin: 0 auto 40px;">
                <h2 id="libro-titulo" style="font-size: 3rem; margin: 0; color: var(--azul);"></h2>
                <h3 id="libro-sub" style="font-size: 1.8rem; font-style: italic; margin: 10px 0;"></h3>
                
                <div class="meta-box">
                    <span id="meta-vol" style="color: var(--dorado); font-weight: bold;"></span>
                    <div id="meta-datos"></div>
                </div>
            </div>

            <div class="contenido-libro">
                <div id="libro-intro" class="texto-academico" style="font-weight: bold; border-bottom: 1px solid #ccc; padding-bottom: 30px; margin-bottom: 30px;"></div>
                <div id="libro-cuerpo" class="texto-academico"></div>
                <a id="btn-pdf" href="#" class="btn-pdf" target="_blank">DESCARGAR VERSIÓN COMPLETA (PDF)</a>
            </div>
        </div>
    </div>

    <script>
        const catalogo = [
            {
                id: 'alejandro',
                vol: '01',
                titulo: 'ALEJANDRO III DE MACEDONIA',
                sub: 'Análisis Académico Integral',
                autor: 'Gabriel Alcántara Tovar',
                img: 'portada1.jpg',
                intro: 'Este volumen analiza las estructuras de poder...',
                cuerpo: 'El ascenso de Macedonia no fue un accidente...',
                pdf: 'libros/alejandro_magno.pdf'
            },
            {
                id: 'therian',
                vol: '02',
                titulo: 'EL MUNDO THERIAN',
                sub: 'Perspectivas sobre Identidad No Humana',
                autor: 'Gabriel Alcántara Tovar',
                img: 'portada2.jpg',
                intro: 'Exploración profunda sobre el fenómeno therian...',
                cuerpo: 'La comprensión de la identidad requiere trascender...',
                pdf: 'libros/therian.pdf'
            }
        ];

        let indiceActual = 0;

        function renderizarBiblioteca() {
            const estante = document.getElementById('estante-libros');
            estante.innerHTML = catalogo.map((l, index) => `
                <div class="libro-objeto" onclick="abrirLibro('${l.id}')">
                    <img src="${l.img}" alt="${l.titulo}">
                    <p>${l.titulo}</p>
                </div>
            `).join('');
        }

        function abrirLibro(id) {
            indiceActual = catalogo.findIndex(l => l.id === id);
            renderizar();
            document.getElementById('vista-biblioteca').style.display = 'none';
            document.getElementById('vista-lector').style.display = 'block';
            window.scrollTo(0,0);
        }

        function irABiblioteca() {
            document.getElementById('vista-biblioteca').style.display = 'block';
            document.getElementById('vista-lector').style.display = 'none';
        }

        function renderizar() {
            const l = catalogo[indiceActual];
            document.getElementById('meta-vol').innerText = 'VOL: ' + l.vol;
            document.getElementById('meta-datos').innerHTML = `
                <p>AUTOR: ${l.autor}</p>
                <p>PAÍS: MÉXICO</p>
                <p>AÑO: 2026</p>
                <p style="color:var(--azul); font-weight:bold; margin-top:20px;">[ ESTADO: EN PRENSA ]</p>
            `;
            document.getElementById('libro-img').src = l.img;
            document.getElementById('libro-titulo').innerText = l.titulo;
            document.getElementById('libro-sub').innerText = l.sub;
            document.getElementById('libro-intro').innerText = l.intro;
            document.getElementById('libro-cuerpo').innerText = l.cuerpo;
            document.getElementById('btn-pdf').href = l.pdf;
        }

        function cambiarLibro(delta) {
            indiceActual = (indiceActual + delta + catalogo.length) % catalogo.length;
            renderizar();
            window.scrollTo(0,0);
        }

        renderizarBiblioteca();
    </script>
</body>
</html>
