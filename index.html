<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tectónica Editorial | Gabriel Alcántara Tovar</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Special+Elite&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --azul: #1a3a6c;
            --papel: #f4f1ea;
            --mesa: #121212;
            --dorado: #b8860b;
            --texto: #1a1a1a;
        }

        body {
            background-color: var(--mesa);
            margin: 0;
            padding: 0;
            font-family: 'Cormorant Garamond', serif;
            color: var(--papel);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- VISTA 1: ESCRITORIO / BIBLIOTECA --- */
        #vista-biblioteca {
            width: 95%;
            max-width: 1000px;
            padding: 40px 10px;
            display: block;
        }

        .mision-vision {
            background: var(--papel);
            color: var(--texto);
            padding: 40px 30px;
            border-radius: 4px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.8);
            margin-bottom: 50px;
            text-align: center;
            border-bottom: 10px solid var(--dorado);
        }

        .mision-vision h1 { font-size: clamp(2.2rem, 8vw, 4rem); color: var(--azul); margin: 0; }
        .mision-vision p { font-size: clamp(1.4rem, 5vw, 1.8rem); line-height: 1.5; font-style: italic; margin-top: 25px; }

        .estante {
            display: flex;
            gap: 40px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .libro-objeto {
            width: 280px;
            cursor: pointer;
            text-align: center;
            transition: transform 0.3s;
        }
        .libro-objeto:hover { transform: translateY(-15px); }
        .libro-objeto img {
            width: 100%;
            border-radius: 2px 8px 8px 2px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            border-left: 10px solid rgba(0,0,0,0.2);
        }
        .libro-objeto p { margin-top: 15px; font-family: 'Special Elite'; font-size: 1.2rem; color: var(--dorado); }

        /* --- VISTA 2: LECTOR DE LIBROS --- */
        #vista-lector {
            display: none; /* Se activa con JS */
            width: 100%;
            max-width: 1200px;
            min-height: 100vh;
            padding: 20px 10px;
            box-sizing: border-box;
        }

        .barra-navegacion {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            width: 100%;
        }

        .btn-nav {
            background: var(--azul);
            color: white;
            border: 3px solid var(--dorado);
            padding: 15px;
            font-family: 'Special Elite';
            font-size: 1.2rem;
            cursor: pointer;
            flex: 1;
        }

        .contenedor-dual {
            display: flex;
            flex-direction: column; /* Apilado por defecto para móvil */
            background: var(--papel);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        /* Lado Izquierdo: Ficha Técnica */
        .ficha-tecnica {
            padding: 40px;
            background: #eeebe3;
            color: var(--texto);
            border-bottom: 2px solid #ddd;
            text-align: center;
        }

        .meta-box {
            text-align: left;
            font-family: 'Special Elite';
            border-left: 5px solid var(--azul);
            padding-left: 20px;
            margin-top: 20px;
            font-size: 1.2rem;
            color: #444;
        }

        /* Lado Derecho: El Contenido del Libro */
        .contenido-libro {
            padding: 40px;
            color: var(--texto);
            position: relative;
            min-height: 600px;
        }

        .pagina { display: none; } /* Ocultamos ambas */
        .pagina.activa { display: block; animation: fadeIn 0.5s; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .portada-lector { max-height: 350px; display: block; margin: 0 auto 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        
        .texto-principal { font-size: 1.5rem; line-height: 1.6; text-align: justify; }
        .capitular::first-letter {
            float: left; font-size: 5rem; line-height: 0.7; padding-top: 10px; padding-right: 15px; color: var(--azul); font-weight: bold;
        }

        .btn-girar {
            display: block;
            width: 100%;
            margin-top: 40px;
            padding: 20px;
            background: #e0ddd5;
            border: 2px dashed var(--azul);
            color: var(--azul);
            font-family: 'Special Elite';
            font-size: 1.3rem;
            cursor: pointer;
            text-align: center;
        }

        .contenedor-botones { display: flex; flex-direction: column; gap: 15px; margin-top: 30px; }
        .btn-pdf { border: 3px solid var(--azul); color: var(--azul); padding: 20px; text-decoration: none; font-family: 'Special Elite'; text-align: center; font-weight: bold; font-size: 1.2rem; }
        .btn-mail { background: var(--azul); color: white; padding: 20px; text-decoration: none; font-family: 'Special Elite'; text-align: center; font-size: 1.2rem; }

        /* --- RESPONSIVE PARA PC --- */
        @media (min-width: 900px) {
            .contenedor-dual { flex-direction: row; min-height: 850px; }
            .ficha-tecnica { width: 35%; border-bottom: 0; border-right: 2px solid #ddd; }
            .contenido-libro { width: 65%; }
            .barra-navegacion { max-width: 1200px; }
            .btn-nav { flex: none; width: 250px; }
        }
    </style>
</head>
<body>

    <div id="vista-biblioteca">
        <div class="mision-vision">
            <img src="logo.png" alt="Tectónica" style="max-width: 150px; margin-bottom: 20px;">
            <h1>TECTÓNICA EDITORIAL</h1>
            <p>"Tender puentes allí donde el desconocimiento ha levantado muros. Investigar con rigor bajo la perspectiva humanista biosférica."</p>
        </div>

        <div class="estante">
            <div class="libro-objeto" onclick="abrirLibro('therians')">
                <img src="portada-therians.jpg" alt="Vol. 001">
                <p>VOL. 001: THERIANS</p>
            </div>
            <div class="libro-objeto" onclick="abrirLibro('alejandro')">
                <img src="portada-alejandro.jpg" alt="Vol. 002">
                <p>VOL. 002: ALEJANDRO III</p>
            </div>
        </div>
    </div>

    <div id="vista-lector">
        <div class="barra-navegacion">
            <button class="btn-nav" onclick="irABiblioteca()">⬅ ESCRITORIO</button>
            <button class="btn-nav" onclick="cambiarLibro(-1)">ANTERIOR</button>
            <button class="btn-nav" onclick="cambiarLibro(1)">SIGUIENTE</button>
        </div>

        <div class="contenedor-dual">
            <div class="ficha-tecnica">
                <img src="logo.png" alt="Logo" style="max-width: 100px;">
                <h2 id="meta-vol" style="margin: 20px 0; color: var(--azul); font-size: 2rem;"></h2>
                <div id="meta-datos" class="meta-box"></div>
            </div>

            <div class="contenido-libro">
                
                <div id="hoja-a" class="pagina activa">
                    <img id="libro-img" src="" class="portada-lector">
                    <h2 id="libro-titulo" style="margin:0; font-size: 2.8rem; color: var(--azul); line-height: 1;"></h2>
                    <p id="libro-sub" style="font-style:italic; color:#666; font-size: 1.3rem; margin-bottom: 25px;"></p>
                    <div id="libro-intro" class="texto-principal capitular"></div>
                    <button class="btn-girar" onclick="cambiarPagina(2)">VER SINOPSIS COMPLETA 👉</button>
                </div>

                <div id="hoja-b" class="pagina">
                    <h3 style="font-family:'Special Elite'; color:var(--azul); font-size: 1.8rem;">ANÁLISIS DE LA OBRA</h3>
                    <div id="libro-cuerpo" class="texto-principal"></div>
                    
                    <div class="contenedor-botones">
                        <a id="btn-pdf" href="#" download class="btn-pdf">📥 DESCARGAR FRAGMENTO (PDF)</a>
                        <a href="mailto:contacto@tectonicaeditorial.com" class="btn-mail">✉️ CONTACTAR AL AUTOR</a>
                    </div>
                    
                    <button class="btn-girar" onclick="cambiarPagina(1)">⬅ VOLVER A LA PORTADA</button>
                </div>

            </div>
        </div>
    </div>

    <script>
        const catalogo = [
            {
                id: 'therians', vol: '001', autor: 'GABRIEL ALCÁNTARA TOVAR',
                titulo: 'THERIANS', sub: 'Identidad animal en la era digital',
                img: 'portada-therians.jpg',
                intro: 'La identidad es, quizás, el territorio más complejo que un ser humano debe cartografiar durante su vida. Históricamente, este mapa se dibujaba con líneas claras; hoy el paisaje es vasto y diverso.',
                cuerpo: 'Este libro nace de una necesidad urgente: la de tender puentes allí donde el desconocimiento ha levantado muros. El fenómeno therian es una búsqueda profunda de sentido en una era de hiperconectividad.',
                pdf: 'fragmento-therians.pdf'
            },
            {
                id: 'alejandro', vol: '002', autor: 'GABRIEL ALCÁNTARA TOVAR',
                titulo: 'ALEJANDRO III', sub: 'Análisis Académico Integral',
                img: 'portada-alejandro.jpg',
                intro: '¿Qué podemos conocer realmente sobre Alejandro Magno? La respuesta honesta es que podemos conocer considerablemente menos de lo que las narrativas populares sugieren.',
                cuerpo: 'Esta obra aborda la figura de Alejandro III desde un enfoque dialéctico-cartesiano. El análisis triangula fuentes greco-latinas con los diarios astronómicos de Babilonia y evidencia epigráfica.',
                pdf: 'fragmento-alejandro.pdf'
            }
        ];

        let indiceActual = 0;

        function abrirLibro(id) {
            indiceActual = catalogo.findIndex(l => l.id === id);
            renderizar();
            document.getElementById('vista-biblioteca').style.display = 'none';
            document.getElementById('vista-lector').style.display = 'block';
            window.scrollTo(0,0);
        }

        function irABiblioteca() {
            document.getElementById('vista-biblioteca').style.display = 'block';
            document.getElementById('vista-lector').style.display = 'none';
        }

        function renderizar() {
            const l = catalogo[indiceActual];
            document.getElementById('meta-vol').innerText = 'VOLUMEN ' + l.vol;
            document.getElementById('meta-datos').innerHTML = `<p>AUTOR: ${l.autor}</p><p>MÉXICO, 2026</p><p style="color:var(--azul); font-weight:bold; margin-top:20px;">[ EN PRENSA ]</p>`;
            document.getElementById('libro-img').src = l.img;
            document.getElementById('libro-titulo').innerText = l.titulo;
            document.getElementById('libro-sub').innerText = l.sub;
            document.getElementById('libro-intro').innerText = l.intro;
            document.getElementById('libro-cuerpo').innerText = l.cuerpo;
            document.getElementById('btn-pdf').href = l.pdf;
            cambiarPagina(1); // Siempre empezar en la hoja A
        }

        function cambiarLibro(delta) {
            indiceActual = (indiceActual + delta + catalogo.length) % catalogo.length;
            renderizar();
            window.scrollTo(0,0);
        }

        function cambiarPagina(num) {
            if(num === 1) {
                document.getElementById('hoja-a').classList.add('activa');
                document.getElementById('hoja-b').classList.remove('activa');
            } else {
                document.getElementById('hoja-a').classList.remove('activa');
                document.getElementById('hoja-b').classList.add('activa');
            }
            window.scrollTo(0,0);
        }
    </script>
</body>
</html>
