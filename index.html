<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tectónica Editorial | Gabriel Alcántara Tovar</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Special+Elite&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --azul: #1a3a6c;
            --papel: #f4f1ea;
            --mesa: #121212;
            --dorado: #b8860b;
            --texto: #1a1a1a;
        }

        body {
            background-color: var(--mesa);
            margin: 0;
            padding: 0;
            font-family: 'Cormorant Garamond', serif;
            color: var(--papel);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- VISTA 1: BIBLIOTECA / ESCRITORIO --- */
        #vista-biblioteca {
            width: 95%;
            max-width: 1000px;
            padding: 40px 10px;
            display: block;
        }

        .mision-vision {
            background: var(--papel);
            color: var(--texto);
            padding: 50px 30px;
            border-radius: 4px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.8);
            margin-bottom: 50px;
            text-align: center;
            border-bottom: 12px solid var(--dorado);
        }

        .mision-vision h1 { font-size: clamp(2.5rem, 10vw, 4.5rem); color: var(--azul); margin: 0; font-weight: 600; }
        .mision-vision p { font-size: clamp(1.5rem, 6vw, 2rem); line-height: 1.4; font-style: italic; margin-top: 30px; color: #333; }

        .estante {
            display: flex;
            gap: 50px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .libro-objeto {
            width: 100%;
            max-width: 300px;
            cursor: pointer;
            text-align: center;
            transition: transform 0.3s;
            box-sizing: border-box;
        }
        .libro-objeto:hover { transform: translateY(-15px); }

        .libro-objeto img {
            width: 100%;
            /* Se eliminó aspect-ratio y object-fit para que la portada no se recorte */
            border-radius: 2px 8px 8px 2px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
            border-left: 10px solid rgba(0,0,0,0.2);
            box-sizing: border-box;
            height: auto; /* Permite que la imagen tome su altura natural sin cortarse */
        }
        .libro-objeto p { margin-top: 20px; font-family: 'Special Elite'; font-size: 1.4rem; color: var(--dorado); }

        /* --- SECCIÓN CONTACTO --- */
        .seccion-contacto {
            margin-top: 80px;
            padding: 50px;
            background: #1a1a1a;
            border: 2px solid var(--dorado);
            border-radius: 4px;
            width: 100%;
            box-sizing: border-box;
        }

        .seccion-contacto h2 {
            font-family: 'Special Elite';
            color: var(--dorado);
            text-align: center;
            font-size: 2.2rem;
            margin-bottom: 30px;
        }

        .form-grupo {
            margin-bottom: 25px;
        }

        .form-grupo label {
            display: block;
            font-family: 'Special Elite';
            font-size: 1.3rem;
            margin-bottom: 10px;
            color: var(--papel);
        }

        .form-control {
            width: 100%;
            padding: 15px;
            font-size: 1.5rem;
            font-family: 'Cormorant Garamond', serif;
            background: var(--papel);
            border: none;
            border-radius: 2px;
            box-sizing: border-box;
        }

        textarea.form-control {
            height: 150px;
            resize: vertical;
        }

        .btn-enviar {
            background: var(--dorado);
            color: white;
            border: none;
            padding: 20px;
            font-family: 'Special Elite';
            font-size: 1.5rem;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
        }

        .btn-enviar:hover {
            background: #966d09;
        }

        /* --- VISTA 2: LECTOR (Mesa de Trabajo) --- */
        #vista-lector {
            display: none;
            width: 100%;
            max-width: 1300px;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .barra-navegacion {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            width: 100%;
            flex-wrap: wrap;
        }

        .btn-nav {
            background: var(--azul);
            color: white;
            border: 3px solid var(--dorado);
            padding: 20px;
            font-family: 'Special Elite';
            font-size: 1.3rem;
            cursor: pointer;
            flex: 1;
            min-width: 150px;
            transition: background 0.3s;
        }
        .btn-nav:hover { background: #254d8c; }

        .contenedor-dual {
            display: flex;
            flex-direction: column;
            background: var(--papel);
            border-radius: 8px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.6);
            color: var(--texto);
        }

        .ficha-tecnica {
            padding: 40px;
            background: #eeebe3;
            border-bottom: 3px solid #ddd;
            text-align: center;
        }

        .meta-box {
            text-align: left;
            font-family: 'Special Elite';
            border-left: 6px solid var(--azul);
            padding-left: 25px;
            margin-top: 25px;
            font-size: 1.4rem;
            color: #444;
            line-height: 1.6;
        }

        .contenido-libro {
            padding: 50px 40px;
            position: relative;
        }

        .portada-lector { 
            height: auto;
            max-height: 500px; /* Ajustado para que la portada quepa bien sin deformarse */
            width: auto;
            max-width: 100%;
            display: block; 
            margin: 0 auto 40px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.2); 
        }
        
        .texto-academico { 
            font-size: 1.7rem; 
            line-height: 1.6; 
            text-align: justify; 
            margin-bottom: 40px;
        }

        .capitular::first-letter {
            float: left; font-size: 6rem; line-height: 0.7; padding-top: 10px; padding-right: 20px; color: var(--azul); font-weight: bold;
        }

        .separador {
            height: 2px;
            background: linear-gradient(to right, transparent, var(--dorado), transparent);
            margin: 50px 0;
        }

        .contenedor-botones { display: flex; flex-direction: column; gap: 20px; margin-top: 50px; }
        .btn-accion { 
            padding: 25px; 
            text-decoration: none; 
            font-family: 'Special Elite'; 
            text-align: center; 
            font-size: 1.4rem; 
            font-weight: bold;
            border-radius: 4px;
        }
        .btn-pdf { border: 4px solid var(--azul); color: var(--azul); }

        @media (min-width: 1000px) {
            .contenedor-dual { flex-direction: row; min-height: 900px; }
            .ficha-tecnica { width: 35%; border-bottom: 0; border-right: 3px solid #ddd; }
            .contenido-libro { width: 65%; padding: 60px 80px; }
            .barra-navegacion { flex-wrap: nowrap; }
            .btn-nav { flex: none; width: 280px; }
        }
    </style>
</head>
<body>

    <div id="vista-biblioteca">
        <div class="mision-vision">
            <img src="logo.webp" alt="Tectónica" style="max-width: 180px; margin-bottom: 30px;">
            <h1>TECTÓNICA EDITORIAL</h1>
            <p>"Tender puentes allí donde el desconocimiento ha levantado muros. Investigar con rigor académico bajo la perspectiva humanista biosférica."</p>
        </div>

        <div class="estante">
            <div class="libro-objeto" onclick="abrirLibro('therians')">
                <img src="portaga_therians.webp" alt="Vol. 001">
                <p>VOL. 001: THERIANS</p>
            </div>
            <div class="libro-objeto" onclick="abrirLibro('alejandro')">
                <img src="portada-alejandro.webp" alt="Vol. 002">
                <p>VOL. 002: ALEJANDRO III</p>
            </div>
        </div>

        <div class="seccion-contacto">
            <h2>CORRESPONDENCIA EDITORIAL</h2>
            <form action="https://formspree.io/f/xqegzzqg" method="POST">
                <div class="form-grupo">
                    <label>NOMBRE COMPLETO:</label>
                    <input type="text" name="nombre" class="form-control" required placeholder="Escriba su nombre...">
                </div>
                <div class="form-grupo">
                    <label>CORREO ELECTRÓNICO:</label>
                    <input type="email" name="_replyto" class="form-control" required placeholder="Su correo para recibir respuesta...">
                </div>
                <div class="form-grupo">
                    <label>MENSAJE O CONSULTA:</label>
                    <textarea name="mensaje" class="form-control" required placeholder="Escriba su mensaje aquí..."></textarea>
                </div>
                <button type="submit" class="btn-enviar">ENVIAR CORRESPONDENCIA</button>
            </form>
        </div>
    </div>

    <div id="vista-lector">
        <div class="barra-navegacion">
            <button class="btn-nav" onclick="irABiblioteca()">⬅ ESCRITORIO</button>
            <button class="btn-nav" onclick="cambiarLibro(-1)">ANTERIOR</button>
            <button class="btn-nav" onclick="cambiarLibro(1)">SIGUIENTE</button>
        </div>

        <div class="contenedor-dual">
            <div class="ficha-tecnica">
                <img src="logo.webp" alt="Logo" style="max-width: 130px;">
                <h2 id="meta-vol" style="margin: 30px 0; color: var(--azul); font-size: 2.5rem; font-family:'Special Elite';"></h2>
                <div id="meta-datos" class="meta-box"></div>
            </div>

            <div class="contenido-libro">
                <img id="libro-img" src="" class="portada-lector">
                
                <h2 id="libro-titulo" style="margin:0; font-size: 3.5rem; color: var(--azul); line-height: 1.1;"></h2>
                <p id="libro-sub" style="font-style:italic; color:#666; font-size: 1.5rem; margin-bottom: 40px;"></p>
                
                <div id="libro-intro" class="texto-academico
