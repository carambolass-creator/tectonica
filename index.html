<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tectónica Editorial | Catálogo Interactivo</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        :root {
            --azul: #1a3a6c;
            --papel: #f4f1ea;
            --mesa: #121212;
            --dorado: #b8860b;
        }

        body {
            background-color: var(--mesa);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            font-family: 'Cormorant Garamond', serif;
            overflow-x: hidden;
            padding-top: 20px;
        }

        /* SELECTOR DE LIBROS (Accesibilidad: Botones grandes) */
        .selector-catalogo {
            margin-bottom: 30px;
            display: flex;
            gap: 20px;
            z-index: 100;
        }

        .btn-volumen {
            background: transparent;
            color: white;
            border: 2px solid var(--dorado);
            padding: 12px 25px;
            font-family: 'Special Elite', monospace;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1.1rem;
        }

        .btn-volumen.active {
            background: var(--dorado);
            color: var(--mesa);
            box-shadow: 0 0 15px var(--dorado);
        }

        .book {
            display: flex;
            width: 95%;
            max-width: 1100px;
            height: 820px;
            position: relative;
            perspective: 2000px;
        }

        /* Página Izquierda (Metadatos dinámicos) */
        .page-left {
            flex: 1;
            background: var(--papel);
            padding: 60px;
            border-radius: 5px 0 0 5px;
            box-shadow: inset -15px 0 30px rgba(0,0,0,0.05), -20px 20px 60px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            text-align: center;
            z-index: 1;
            border-right: 1px solid rgba(0,0,0,0.1);
        }

        .flip-container {
            flex: 1;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1s cubic-bezier(0.645, 0.045, 0.355, 1);
            transform-origin: left center;
            z-index: 10;
        }

        .flipped { transform: rotateY(-180deg); }

        .face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            padding: 50px 60px 100px 60px; 
            box-sizing: border-box;
            background: var(--papel);
            display: flex;
            flex-direction: column;
            box-shadow: inset 15px 0 30px rgba(0,0,0,0.05), 10px 10px 40px rgba(0,0,0,0.4);
            overflow-y: auto; 
            scrollbar-width: none; 
        }
        
        .face::-webkit-scrollbar { display: none; }

        .front { border-radius: 0 5px 5px 0; }
        .back { 
            transform: rotateY(180deg); 
            border-radius: 5px 0 0 5px; 
            background: #ebe8df;
        }

        .logo { max-width: 140px; margin-bottom: 10px; }
        .cover { max-height: 320px; align-self: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); margin-bottom: 20px; border: 1px solid #ddd; }
        
        .description { font-size: 1.2rem; line-height: 1.6; text-align: justify; color: #222; }
        .capitular::first-letter {
            float: left; font-size: 3.5rem; line-height: 0.8; padding-top: 10px; padding-right: 12px; color: var(--azul); font-weight: 600;
        }

        /* INDICADOR GIRO */
        .indicador-giro {
            position: absolute;
            bottom: 30px;
            right: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-family: 'Special Elite', monospace;
            font-size: 0.9rem;
            color: #666;
            z-index: 100;
        }

        .dedo-frente { font-size: 1.8rem; animation: empujar-der 1.2s infinite alternate ease-in-out; }
        @keyframes empujar-der { 0% { transform: translateX(0); } 100% { transform: translateX(8px); } }

        .indicador-reverso { right: auto; left: 40px; flex-direction: row-reverse; }
        .dedo-reverso { font-size: 1.8rem; transform: scaleX(-1); animation: empujar-izq 1.2s infinite alternate ease-in-out; }
        @keyframes empujar-izq { 0% { transform: scaleX(-1) translateX(0); } 100% { transform: scaleX(-1) translateX(-8px); } }

        .contenedor-botones { display: flex; flex-direction: column; gap: 15px; margin-top: 30px; }
        .btn-descarga { background: transparent; color: var(--azul); border: 2px solid var(--azul); padding: 15px; text-decoration: none; font-family: 'Special Elite'; text-align: center; transition: 0.3s; }
        .btn-descarga:hover { background: rgba(26, 58, 108, 0.1); }
        .btn-contacto { background: var(--azul); color: white; padding: 15px; text-decoration: none; font-family: 'Special Elite'; text-align: center; border: 2px solid var(--azul); }

        /* RESPONSIVE */
        @media (max-width: 850px) {
            .book { flex-direction: column; height: auto; margin-bottom: 40px; }
            .page-left { padding: 40px 30px; border-radius: 5px 5px 0 0; }
            .flip-container { height: 780px; transform-origin: top; }
            .flipped { transform: rotateX(-180deg); }
            .face { padding: 30px 20px 80px 20px; }
            .cover { max-height: 250px; }
            .description { font-size: 1.1rem; }
        }
    </style>
</head>
