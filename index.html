<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tectónica Editorial | Gabriel Alcántara Tovar</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Special+Elite&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --azul: #1a3a6c;
            --papel: #f4f1ea;
            --mesa: #121212;
            --dorado: #b8860b;
            --texto: #1a1a1a;
        }

        body {
            background-color: var(--mesa);
            margin: 0;
            padding: 0;
            font-family: 'Cormorant Garamond', serif;
            color: var(--papel);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* --- VISTA 1: BIBLIOTECA / ESCRITORIO --- */
        #vista-biblioteca {
            width: 95%;
            max-width: 1000px;
            padding: 40px 10px;
            display: block; /* Asegura que sea visible al cargar */
        }

        .mision-vision {
            background: var(--papel);
            color: var(--texto);
            padding: 50px 30px;
            border-radius: 4px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.8);
            margin-bottom: 50px;
            text-align: center;
            border-bottom: 12px solid var(--dorado);
        }

        .mision-vision h1 { font-size: clamp(2.5rem, 10vw, 4.5rem); color: var(--azul); margin: 0; font-weight: 600; }
        .mision-vision p { font-size: clamp(1.5rem, 6vw, 2.2rem); line-height: 1.4; font-style: italic; margin-top: 30px; color: #333; }

        .estante {
            display: flex;
            gap: 50px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 50px;
        }

        .libro-objeto {
            width: 100%;
            max-width: 300px;
            cursor: pointer;
            text-align: center;
            transition: transform 0.3s;
        }
        .libro-objeto:hover { transform: translateY(-15px); }

        .libro-objeto img {
            width: 100%;
            aspect-ratio: 3 / 4;
            object-fit: cover;
            background: #333; /* Color de respaldo si no carga la imagen */
            border-radius: 2px 8px 8px 2px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
            border-left: 10px solid rgba(0,0,0,0.2);
        }
        
        .libro-objeto p { margin-top: 20px; font-family: 'Special Elite'; font-size: 1.6rem; color: var(--dorado); }

        /* --- SECCIÓN CONTACTO --- */
        .seccion-contacto {
            margin-top: 50px;
            padding: 40px;
            background: #1a1a1a;
            border: 2px solid var(--dorado);
            border-radius: 4px;
            width: 100%;
            box-sizing: border-box;
        }

        .seccion-contacto h2 {
            font-family: 'Special Elite';
            color: var(--dorado);
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 30px;
        }

        .form-grupo { margin-bottom: 25px; }

        .form-grupo label {
            display: block;
            font-family: 'Special Elite';
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: var(--papel);
        }

        .form-control {
            width: 100%;
            padding: 18px;
            font-size: 1.8rem;
            font-family: 'Cormorant Garamond', serif;
            background: var(--papel);
            border: none;
            border-radius: 4px;
            box-sizing: border-box;
            color: var(--texto);
        }

        textarea.form-control { height: 200px; resize: vertical; }

        .btn-enviar {
            background: var(--dorado);
            color: white;
            border: none;
            padding: 25px;
            font-family: 'Special Elite';
            font-size: 1.8rem;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
            font-weight: bold;
        }
        .btn-enviar:hover { background: #966d09; }

        /* --- VISTA 2: LECTOR --- */
        #vista-lector {
            display: none;
            width: 100%;
            max-width: 1300px;
            padding: 20px;
            box-sizing: border-box;
        }

        .barra-navegacion {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            width: 100%;
            flex-wrap: wrap;
        }

        .btn-nav {
            background: var(--azul);
            color: white;
            border: 3px solid var(--dorado);
            padding: 20px;
            font-family: 'Special Elite';
            font-size: 1.4rem;
            cursor: pointer;
            flex: 1;
            min-width: 150px;
        }

        .contenedor-dual {
            display: flex;
            flex-direction: column;
            background: var(--papel);
            border-radius: 8px;
            color: var(--texto);
            overflow: hidden;
        }

        .ficha-tecnica { padding: 40px; background: #eeebe3; text-align: center; border-bottom: 3px solid #ddd; }
        .contenido-libro { padding: 40px; }
        
        .texto-academico { font-size: 1.8rem; line-height: 1.6; text-align: justify; }
        .capitular::first-letter {
            float: left; font-size: 6rem; line-height: 0.7; padding-top: 10px; padding-right: 20px; color: var(--azul); font-weight: bold;
        }

        @media (min-width: 1000px) {
            .contenedor-dual { flex-direction: row; }
            .ficha-tecnica { width: 35%; border-bottom: 0; border-right: 3px solid #ddd; }
            .contenido-libro { width: 65%; padding: 60px 80px; }
        }
    </style>
</head>
<body>

    <div id="vista-biblioteca">
        <div class="mision-vision">
            <img src="logo.png" alt="Tectónica Logo" style="max-width: 180px; margin-bottom: 30px; display: block; margin-left: auto; margin-right: auto;">
            <h1>TECTÓNICA EDITORIAL</h1>
            <p>"Tender puentes allí donde el desconocimiento ha levantado muros. Investigar con rigor académico bajo la perspectiva humanista biosférica."</p>
        </div>

        <div class="estante">
            <div class="libro-objeto" onclick="abrirLibro('therians')">
                <img src="portada-therians.jpg" alt="Vol. 001">
                <p>VOL. 001: THERIANS</p>
            </div>
            <div class="libro-objeto" onclick="abrirLibro('alejandro')">
                <img src="portada-alejandro.jpg" alt="Vol. 002">
                <p>VOL. 002: ALEJANDRO III</p>
            </div>
        </div>

        <div class="seccion-contacto">
            <h2>CORRESPONDENCIA EDITORIAL</h2>
            <form action="https://formspree.io/f/xqegzzqg" method="POST">
                <div class="form-grupo">
                    <label>NOMBRE COMPLETO:</label>
                    <input type="text" name="nombre" class="form-control" required placeholder="Su nombre...">
                </div>
                <div class="form-grupo">
                    <label>CORREO ELECTRÓNICO:</label>
                    <input type="email" name="_replyto" class="form-control" required placeholder="Su correo...">
                </div>
                <div class="form-grupo">
                    <label>MENSAJE:</label>
                    <textarea name="mensaje" class="form-control" required placeholder="Escriba su mensaje aquí..."></textarea>
                </div>
                <button type="submit" class="btn-enviar">ENVIAR CORRESPONDENCIA</button>
            </form>
        </div>
    </div>

    <div id="vista-lector">
        <div class="barra-navegacion">
            <button class="btn-nav" onclick="irABiblioteca()">⬅ VOLVER</button>
            <button class="btn-nav" onclick="cambiarLibro(-1)">ANTERIOR</button>
            <button class="btn-nav" onclick="cambiarLibro(1)">SIGUIENTE</button>
        </div>

        <div class="contenedor-dual">
            <div class="ficha-tecnica">
                <h2 id="meta-vol" style="color: var(--azul); font-size: 2.5rem; font-family:'Special Elite';"></h2>
                <div id="meta-datos" style="text-align: left; font-family: 'Special Elite'; font-size: 1.4rem; border-left: 5px solid var(--azul); padding-left: 15px;"></div>
            </div>
            <div class="contenido-libro">
                <h2 id="libro-titulo" style="font-size: 3.5rem; color: var(--azul); margin: 0;"></h2>
                <p id="libro-sub" style="font-style: italic; font-size: 1.6rem; color: #555;"></p>
                <div id="libro-intro" class="texto-academico capitular"></div>
                <hr style="margin: 40px 0; border: 1px solid var(--dorado);">
                <div id="libro-cuerpo" class="texto-academico"></div>
            </div>
        </div>
    </div>

    <script>
        const catalogo = [
            {
                id: 'therians', vol: '001', autor: 'GABRIEL ALCÁNTARA TOVAR',
                titulo: 'THERIANS', sub: 'Identidad animal en la era digital',
                intro: 'La identidad es, quizás, el territorio más complejo que un ser humano debe cartografiar durante su vida...',
                cuerpo: 'Este libro nace de una necesidad urgente: la de tender puentes allí donde el desconocimiento ha levantado muros.'
            },
            {
                id: 'alejandro', vol: '002', autor: 'GABRIEL ALCÁNTARA TOVAR',
                titulo: 'ALEJANDRO III', sub: 'Análisis Académico Integral',
                intro: '¿Qué podemos conocer realmente sobre Alejandro Magno?',
                cuerpo: 'Esta obra aborda la figura de Alejandro III desde un enfoque dialéctico-cartesiano multidimensional.'
            }
        ];

        let indiceActual = 0;

        function abrirLibro(id) {
            indiceActual = catalogo.findIndex(l => l.id === id);
            renderizar();
            document.getElementById('vista-biblioteca').style.display = 'none';
            document.getElementById('vista-lector').style.display = 'block';
            window.scrollTo(0,0);
        }

        function irABiblioteca() {
            document.getElementById('vista-biblioteca').style.display = 'block';
            document.getElementById('vista-lector').style.display = 'none';
        }

        function renderizar() {
            const l = catalogo[indiceActual];
            document.getElementById('meta-vol').innerText = 'VOL: ' + l.vol;
            document.getElementById('meta-datos').innerHTML = `<p>AUTOR: ${l.autor}</p><p>AÑO: 2026</p><p>ESTADO: EN PRENSA</p>`;
            document.getElementById('libro-titulo').innerText = l.titulo;
            document.getElementById('libro-sub').innerText = l.sub;
            document.getElementById('libro-intro').innerText = l.intro;
            document.getElementById('libro-cuerpo').innerText = l.cuerpo;
        }

        function cambiarLibro(delta) {
            indiceActual = (indiceActual + delta + catalogo.length) % catalogo.length;
            renderizar();
            window.scrollTo(0,0);
        }
    </script>
</body>
</html>
