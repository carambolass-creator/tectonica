<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tectónica Editorial | Interactivo Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        :root {
            --azul: #1a3a6c;
            --papel: #f4f1ea;
            --mesa: #121212;
        }

        body {
            background-color: var(--mesa);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Cormorant Garamond', serif;
            perspective: 2500px; /* Profundidad para el giro */
        }

        /* Contenedor del Libro */
        .book {
            display: flex;
            width: 95%;
            max-width: 1100px;
            height: 850px;
            position: relative;
            transform-style: preserve-3d;
        }

        /* Página Izquierda (Estatica) */
        .left-page {
            flex: 1;
            background: var(--papel);
            padding: 60px;
            border-radius: 5px 0 0 5px;
            box-shadow: inset -15px 0 30px rgba(0,0,0,0.05), -20px 20px 60px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            text-align: center;
            border-right: 1px solid rgba(0,0,0,0.1);
            z-index: 1;
        }

        /* La Hoja que Gira */
        .flip-page {
            flex: 1;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1s cubic-bezier(0.645, 0.045, 0.355, 1);
            transform-origin: left center;
            cursor: pointer;
            z-index: 10;
        }

        /* Estado Girado */
        .flipped {
            transform: rotateY(-180deg);
            z-index: 20; /* Se asegura de estar sobre la pagina izquierda */
        }

        /* Caras de la Hoja */
        .face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden; /* Oculta la espalda mientras gira */
            padding: 60px 60px 100px 60px; /* Márgenes editoriales */
            box-sizing: border-box;
            background: var(--papel);
            display: flex;
            flex-direction: column;
        }

        .front {
            border-radius: 0 5px 5px 0;
            box-shadow: inset 15px 0 30px rgba(0,0,0,0.05), 10px 10px 30px rgba(0,0,0,0.3);
        }

        .back {
            transform: rotateY(180deg); /* Volteamos el contenido del reverso */
            background: #ebe8df;
            border-radius: 5px 0 0 5px;
            box-shadow: inset -15px 0 30px rgba(0,0,0,0.05);
        }

        /* Contenido */
        .logo { max-width: 140px; margin-bottom: 20px; }
        .book-cover { max-height: 220px; align-self: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); margin-bottom: 30px; }
        
        .description { 
            font-size: 1.25rem; 
            line-height: 1.6; 
            text-align: justify; 
            color: #222;
        }

            float: left;
            font-size: 3.5rem;
            line-height: 0
