<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tectónica Editorial | Gabriel Alcántara Tovar</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Special+Elite&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --azul: #1a3a6c;
            --papel: #f4f1ea;
            --mesa: #121212;
            --dorado: #b8860b;
            --texto: #1a1a1a;
        }

        body {
            background-color: var(--mesa);
            margin: 0;
            padding: 0;
            font-family: 'Cormorant Garamond', serif;
            color: var(--papel);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- VISTA 1: BIBLIOTECA / ESCRITORIO --- */
        #vista-biblioteca {
            width: 95%;
            max-width: 1000px;
            padding: 40px 10px;
            display: block;
        }

        .mision-vision {
            background: var(--papel);
            color: var(--texto);
            padding: 50px 30px;
            border-radius: 4px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.8);
            margin-bottom: 50px;
            text-align: center;
            border-bottom: 12px solid var(--dorado);
        }

        .mision-vision h1 { font-size: clamp(2.5rem, 10vw, 4.5rem); color: var(--azul); margin: 0; font-weight: 600; }
        .mision-vision p { font-size: clamp(1.5rem, 6vw, 2rem); line-height: 1.4; font-style: italic; margin-top: 30px; color: #333; }

        .estante {
            display: flex;
            gap: 50px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .libro-objeto {
            width: 100%;
            max-width: 300px;
            cursor: pointer;
            text-align: center;
            transition: transform 0.3s;
            box-sizing: border-box;
        }
        .libro-objeto:hover { transform: translateY(-15px); }

        .libro-objeto img {
            width: 100%;
            aspect-ratio: 3 / 4;
            object-fit: contain;
            object-position: center;
            border-radius: 2px 8px 8px 2px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
            border-left: 10px solid rgba(0,0,0,0.2);
            box-sizing: border-box;
        }
        .libro-objeto p { margin-top: 20px; font-family: 'Special Elite'; font-size: 1.4rem; color: var(--dorado); }

        /* --- SECCIÓN CONTACTO --- */
        .seccion-contacto {
            margin-top: 80px;
            padding: 50px;
            background: #1a1a1a;
            border: 2px solid var(--dorado);
            border-radius: 4px;
            width: 100%;
            box-sizing: border-box;
        }

        .seccion-contacto h2 {
            font-family: 'Special Elite';
            color: var(--dorado);
            text-align: center;
            font-size: 2.2rem;
            margin-bottom: 30px;
        }

        .form-grupo { margin-bottom: 25px; }

        .form-grupo label {
            display: block;
            font-family: 'Special Elite';
            font-size: 1.4rem;
            margin-bottom: 10px;
            color: var(--papel);
        }

        .form-control {
            width: 100%;
            padding: 15px;
            font-size: 1.6rem;
            font-family: 'Cormorant Garamond', serif;
            background: var(--papel);
            border: none;
            border-radius: 2px;
            box-sizing: border-box;
        }

        textarea.form-control { height: 150px; resize: vertical; }

        .btn-enviar {
            background: var(--dorado);
            color: white;
            border: none;
            padding: 20px;
            font-family: 'Special Elite';
            font-size: 1.6rem;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
        }
        .btn-enviar:hover { background: #966d09; }
